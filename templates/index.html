<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Megatron | Stopwatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1 class="title">MEGATRON</h1>
        <button class="btn-reset" id="btn-reset" title="Reset data">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M3 21v-5h5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
<main class="content">
  <!-- Stopwatch Section -->
  <section class="stopwatch-section">
    <div class="timer-display" id="timer-display">00:00.00</div>
    
    <div class="controls">
      <button class="btn btn-start" id="btn-start">START</button>
      <button class="btn btn-stop" id="btn-stop-timer" disabled>STOP</button>
    </div>

    <!-- Language Selector & Separate Leaderboard Area -->
    <div class="language-selector-zone">
      <div class="language-selector">
        <button class="lang-btn active" id="btn-c" data-lang="C">C</button>
        <button class="lang-btn" id="btn-py" data-lang="Python">Python</button>
      </div>
      
      <!-- Sub-Leaderboard for selected language only -->
      <div class="sub-leaderboard">
        <div class="sub-leaderboard-header">
          <span class="col-rank">Rank</span>
          <span class="col-name">Name</span>
          <span class="col-q">Q#</span>
          <span class="col-time">Time</span>
        </div>
        <div id="sub-leaderboard-container" class="leaderboard-body">
          <!-- Populated by JS filtered streams -->
        </div>
      </div>
    </div>
  </section>

  <!-- Main Combined Leaderboard Section -->
  <section class="leaderboard-section">
    <h2 class="section-title">Global Standings</h2>
    <div class="leaderboard">
      <div class="leaderboard-header">
        <span class="col-rank">Rank</span>
        <span class="col-name">Name</span>
        <span class="col-lang">Lang</span>
        <span class="col-q">Q#</span>
        <span class="col-time">Time</span>
      </div>
      <div id="leaderboard-container" class="leaderboard-body">
        <!-- Main dynamic backend loop insertion -->
      </div>
    </div>
  </section>
</main>

    <!-- Status Bar -->
    <footer class="status-bar">
      <span id="status-text">Ready</span>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal" id="result-modal">
    <div class="modal-overlay"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2>Save Result</h2>
      </div>
      <form id="result-form" class="modal-form">
        <div class="form-field">
          <label for="player-name">Name</label>
          <input type="text" id="player-name" placeholder="Your name" required autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="question-no">Question #</label>
          <input type="text" id="question-no" placeholder="Q1" required autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="result-time">Time</label>
          <input type="text" id="result-time" disabled />
        </div>
        <div class="form-field">
          <label for="result-lang">Language</label>
          <select id="result-lang" required>
            <option value="C">C</option>
            <option value="Python">Python</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-action cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-action save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
